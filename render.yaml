services:
  # ── Backend: FastAPI ──────────────────────────────────────────────────────
  - type: web
    name: trafficguard-backend
    runtime: python
    rootDir: trafficguard_backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash render_start.sh
    plan: free
    disk:
      name: trafficguard-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # You set this in the Render dashboard
      - key: GEMINI_VISION_MODEL
        value: gemini-2.0-flash
      - key: MAPMYINDIA_REST_KEY
        sync: false          # Optional — set in dashboard for real geocoding
      - key: DATABASE_PATH
        value: /data/trafficguard.db
      - key: UPLOADS_DIR
        value: /data/uploads
      - key: EVIDENCE_DIR
        value: /data/evidence_output
      - key: CORS_ORIGINS
        value: "*"           # Will be tightened once frontend URL is known
      - key: AUTO_CHALLAN_CONFIDENCE_THRESHOLD
        value: "0.92"
      - key: DEDUP_WINDOW_MINUTES
        value: "10"
      - key: REOFFENDER_WINDOW_DAYS
        value: "7"
      - key: LOW_LIGHT_THRESHOLD
        value: "60"
    healthCheckPath: /health

  # ── Frontend: Static Site ─────────────────────────────────────────────────
  - type: web
    name: trafficguard-frontend
    runtime: static
    staticPublishPath: stitch_trafficguard_ai_dashboard/stitch_trafficguard_ai_dashboard
    buildCommand: echo "No build needed — pure static HTML"
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /live_feed_light_mode/code.html
